add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$golang\
$rust\
$cmd_duration\
$line_break\
$character
"""

[directory]
truncation_length = 3

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[git_branch]
symbol = "🌱 "

[cmd_duration]
min_time = 500
